<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TBPN Archive — Episode Navigator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800,900&f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
<style>
/* ─── RESET & BASE ─────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{min-height:100dvh;font-family:'Satoshi','Inter',sans-serif;font-size:clamp(0.9375rem,0.9rem+0.2vw,1rem);line-height:1.6;background:var(--bg);color:var(--text);transition:background .25s,color .25s}
img{display:block;max-width:100%;height:auto}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
input{font:inherit;color:inherit}

/* ─── DESIGN TOKENS ─────────────────────────────────────── */
:root,[data-theme="dark"]{
  --bg:#0d0d10;
  --surface:#141418;
  --surface-raised:#1c1c22;
  --surface-hover:#22222a;
  --border:#2a2a36;
  --border-subtle:#1f1f28;
  --text:#eeeef4;
  --text-muted:#8888a8;
  --text-faint:#55556a;
  --accent:#ff4035;
  --accent-dim:rgba(255,64,53,.15);
  --accent-glow:rgba(255,64,53,.25);
  --guest-color:#f59e0b;
  --guest-dim:rgba(245,158,11,.12);
  --pill-bg:#1e1e28;
  --shadow-card:0 2px 8px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.3);
  --shadow-panel:0 0 0 1px rgba(255,255,255,.06),-24px 0 80px rgba(0,0,0,.6);
  --radius:12px;
  --radius-sm:8px;
  --radius-xs:5px;
}
[data-theme="light"]{
  --bg:#f4f4f6;
  --surface:#ffffff;
  --surface-raised:#f9f9fb;
  --surface-hover:#f0f0f5;
  --border:#e0e0ea;
  --border-subtle:#ebebf2;
  --text:#111118;
  --text-muted:#666680;
  --text-faint:#aaaabc;
  --accent:#e8321e;
  --accent-dim:rgba(232,50,30,.1);
  --accent-glow:rgba(232,50,30,.2);
  --guest-color:#b45309;
  --guest-dim:rgba(180,83,9,.1);
  --pill-bg:#eeeef5;
  --shadow-card:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --shadow-panel:0 0 0 1px rgba(0,0,0,.08),24px 0 80px rgba(0,0,0,.15);
}

/* ─── TYPOGRAPHY ─────────────────────────────────────────── */
.font-display{font-family:'Cabinet Grotesk','Helvetica Neue',sans-serif}

/* ─── LAYOUT ─────────────────────────────────────────────── */
.site-header{
  position:sticky;top:0;z-index:100;
  background:color-mix(in oklab,var(--bg) 90%,transparent);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--border-subtle);
  padding:0 clamp(1rem,4vw,2.5rem);
}
.header-inner{
  max-width:1400px;margin:0 auto;height:60px;
  display:flex;align-items:center;gap:1.5rem;
}
.logo{
  display:flex;align-items:center;gap:.6rem;flex-shrink:0;
  text-decoration:none;
}
.logo-mark{
  width:34px;height:34px;border-radius:8px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.logo-mark svg{width:20px;height:20px;fill:#fff}
.logo-wordmark{
  font-family:'Cabinet Grotesk',sans-serif;
  font-size:1.1rem;font-weight:800;
  letter-spacing:-.02em;color:var(--text);
  line-height:1;
}
.logo-sub{font-size:.65rem;font-weight:500;color:var(--text-muted);letter-spacing:.04em;text-transform:uppercase;line-height:1}
.search-wrap{
  flex:1;max-width:480px;
  position:relative;
}
.search-input{
  width:100%;height:38px;
  background:var(--surface-raised);
  border:1px solid var(--border);
  border-radius:9999px;
  padding:0 1rem 0 2.6rem;
  font-size:.875rem;color:var(--text);
  outline:none;
  transition:border-color .18s,box-shadow .18s;
}
.search-input::placeholder{color:var(--text-faint)}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.search-icon{
  position:absolute;left:.8rem;top:50%;transform:translateY(-50%);
  color:var(--text-faint);pointer-events:none;
}
.header-right{display:flex;align-items:center;gap:.75rem;margin-left:auto}
.ep-count{
  font-size:.8rem;font-weight:600;color:var(--text-muted);
  letter-spacing:.02em;white-space:nowrap;
}
.ep-count span{color:var(--accent)}
.theme-toggle{
  width:36px;height:36px;border-radius:9999px;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface-raised);border:1px solid var(--border);
  color:var(--text-muted);
  transition:background .18s,color .18s,border-color .18s;
  flex-shrink:0;
}
.theme-toggle:hover{background:var(--surface-hover);color:var(--text)}

/* ─── MAIN CONTENT ───────────────────────────────────────── */
.main{
  padding:clamp(1.5rem,4vw,2.5rem) clamp(1rem,4vw,2.5rem);
  max-width:1400px;margin:0 auto;
}
.section-label{
  font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text-faint);margin-bottom:1.25rem;
}
.no-results{
  text-align:center;padding:4rem 2rem;color:var(--text-muted);
  font-size:.95rem;display:none;
}

/* ─── EPISODE GRID ───────────────────────────────────────── */
.episode-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(min(100%,320px),1fr));
  gap:1.25rem;
}
.episode-card{
  background:var(--surface);
  border:1px solid var(--border-subtle);
  border-radius:var(--radius);
  overflow:hidden;
  cursor:pointer;
  transition:transform .22s cubic-bezier(.16,1,.3,1),
             box-shadow .22s cubic-bezier(.16,1,.3,1),
             border-color .22s;
  box-shadow:var(--shadow-card);
  display:flex;flex-direction:column;
}
.episode-card:hover{
  transform:translateY(-3px);
  box-shadow:var(--shadow-card),0 0 0 1px var(--accent);
  border-color:var(--accent);
}
.episode-card:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

.card-thumb{
  position:relative;width:100%;aspect-ratio:16/9;
  overflow:hidden;background:var(--surface-raised);
  flex-shrink:0;
}
.card-thumb img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .4s cubic-bezier(.16,1,.3,1),opacity .3s;
}
.episode-card:hover .card-thumb img{transform:scale(1.04)}
.thumb-fallback{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--surface-raised),var(--surface-hover));
  color:var(--text-faint);
}
.thumb-play{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.35);
  opacity:0;transition:opacity .2s;
}
.thumb-play svg{width:44px;height:44px;color:#fff;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.episode-card:hover .thumb-play{opacity:1}
.card-date-badge{
  position:absolute;bottom:8px;right:8px;
  background:rgba(0,0,0,.72);backdrop-filter:blur(8px);
  color:#fff;font-size:.7rem;font-weight:600;
  padding:2px 7px;border-radius:4px;
  letter-spacing:.02em;
}

.card-body{
  padding:1rem;flex:1;display:flex;flex-direction:column;gap:.5rem;
}
.card-title{
  font-family:'Cabinet Grotesk',sans-serif;
  font-size:clamp(.875rem,.82rem+0.3vw,1rem);
  font-weight:700;line-height:1.3;
  color:var(--text);
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;
}
.card-footer{
  display:flex;align-items:center;flex-wrap:wrap;gap:.4rem;
  margin-top:auto;padding-top:.35rem;
}
.pill{
  display:inline-flex;align-items:center;gap:.3rem;
  background:var(--pill-bg);
  border:1px solid var(--border-subtle);
  border-radius:4px;
  padding:2px 7px;
  font-size:.7rem;font-weight:600;color:var(--text-muted);
  white-space:nowrap;
}
.pill svg{width:11px;height:11px;flex-shrink:0}
.pill-accent{background:var(--accent-dim);border-color:rgba(255,64,53,.2);color:var(--accent)}

/* ─── SIDE PANEL ─────────────────────────────────────────── */
.panel-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(4px);
  opacity:0;visibility:hidden;
  transition:opacity .3s,visibility .3s;
}
.panel-overlay.open{opacity:1;visibility:visible}

.episode-panel{
  position:fixed;right:0;top:0;bottom:0;z-index:201;
  width:min(520px,100vw);
  background:var(--surface);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .35s cubic-bezier(.16,1,.3,1);
  box-shadow:var(--shadow-panel);
  overflow:hidden;
}
.episode-panel.open{transform:translateX(0)}

.panel-header{
  flex-shrink:0;
  background:var(--bg);
  border-bottom:1px solid var(--border);
}
.panel-thumb-wrap{
  position:relative;width:100%;aspect-ratio:16/9;
  overflow:hidden;background:var(--surface-raised);
  flex-shrink:0;
}
.panel-thumb-wrap img{width:100%;height:100%;object-fit:cover}
.panel-thumb-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.1) 60%,transparent 100%);
  display:flex;align-items:flex-end;
  padding:1.25rem;
}
.panel-watch-btn{
  display:inline-flex;align-items:center;gap:.45rem;
  background:var(--accent);color:#fff;
  padding:.55rem 1.1rem;border-radius:6px;
  font-size:.82rem;font-weight:700;letter-spacing:.02em;
  text-decoration:none;
  transition:background .18s,transform .12s;
  flex-shrink:0;
}
.panel-watch-btn:hover{background:#e03020;transform:scale(1.03)}
.panel-watch-btn svg{width:14px;height:14px}

.panel-meta{
  padding:.9rem 1.25rem;
  display:flex;flex-direction:column;gap:.4rem;
}
.panel-close{
  position:absolute;top:.75rem;right:.75rem;z-index:10;
  width:32px;height:32px;border-radius:9999px;
  background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  transition:background .18s;
}
.panel-close:hover{background:rgba(0,0,0,.8)}
.panel-title{
  font-family:'Cabinet Grotesk',sans-serif;
  font-size:clamp(.95rem,.85rem+0.5vw,1.1rem);
  font-weight:800;line-height:1.25;color:var(--text);
}
.panel-pills{display:flex;flex-wrap:wrap;gap:.35rem}

/* ─── TIMESTAMP LIST ─────────────────────────────────────── */
.panel-body{flex:1;overflow-y:auto;overscroll-behavior:contain}
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-track{background:transparent}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

.ts-section-label{
  padding:.75rem 1.25rem .35rem;
  font-size:.68rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text-faint);
  position:sticky;top:0;background:var(--surface);
  z-index:5;border-bottom:1px solid var(--border-subtle);
}
.ts-list{list-style:none;padding:.25rem 0 1.5rem}
.ts-item{
  display:flex;align-items:flex-start;gap:.85rem;
  padding:.65rem 1.25rem;
  cursor:pointer;
  text-decoration:none;
  border-bottom:1px solid var(--border-subtle);
  transition:background .14s;
  position:relative;
}
.ts-item:last-child{border-bottom:none}
.ts-item:hover{background:var(--surface-hover)}
.ts-item:hover .ts-time{color:var(--accent)}

.ts-item.is-guest{
  background:var(--guest-dim);
  border-left:3px solid var(--guest-color);
}
.ts-item.is-guest:hover{background:rgba(245,158,11,.18)}
.ts-item.is-guest .ts-time{color:var(--guest-color)}

.ts-time{
  font-family:'Satoshi',monospace;
  font-size:.7rem;font-weight:700;
  color:var(--accent);
  background:var(--accent-dim);
  border-radius:4px;
  padding:2px 6px;
  white-space:nowrap;
  flex-shrink:0;
  margin-top:2px;
  letter-spacing:.03em;
  transition:color .14s;
}
.ts-desc{
  font-size:.84rem;line-height:1.45;color:var(--text-muted);
  transition:color .14s;
}
.ts-item:hover .ts-desc{color:var(--text)}
.ts-arrow{
  margin-left:auto;flex-shrink:0;margin-top:3px;
  color:var(--text-faint);opacity:0;
  transition:opacity .14s,transform .14s;
}
.ts-item:hover .ts-arrow{opacity:1;transform:translateX(3px)}

/* ─── MOBILE ─────────────────────────────────────────────── */
@media(max-width:640px){
  .episode-panel{width:100vw;bottom:0;top:auto;height:90dvh;border-radius:18px 18px 0 0;border:none;border-top:1px solid var(--border)}
  .episode-panel{transform:translateY(100%)}
  .episode-panel.open{transform:translateY(0)}
  .ep-count{display:none}
  .search-wrap{max-width:none}
  .logo-sub{display:none}
}
@media(max-width:480px){
  .episode-grid{grid-template-columns:1fr}
}

/* ─── ANIMATIONS ─────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.episode-card{animation:fadeUp .3s cubic-bezier(.16,1,.3,1) both}
.episode-card:nth-child(1){animation-delay:0ms}
.episode-card:nth-child(2){animation-delay:30ms}
.episode-card:nth-child(3){animation-delay:60ms}
.episode-card:nth-child(4){animation-delay:90ms}
.episode-card:nth-child(5){animation-delay:120ms}
.episode-card:nth-child(6){animation-delay:150ms}
.episode-card:nth-child(7){animation-delay:180ms}
.episode-card:nth-child(8){animation-delay:210ms}
.episode-card:nth-child(9){animation-delay:240ms}
.episode-card:nth-child(n+10){animation-delay:270ms}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
}
</style>
</head>

// ─── HELPERS ───────────────────────────────────────────────
function fmtDate(iso){
  const [y,m,d] = iso.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function ytUrl(vid,secs){
  return `https://www.youtube.com/watch?v=${vid}&t=${secs}`;
}
function ytThumb(vid){
  return `https://img.youtube.com/vi/${vid}/maxresdefault.jpg`;
}
function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── RENDER GRID ───────────────────────────────────────────
const grid = document.getElementById('episodeGrid');
const noResults = document.getElementById('noResults');
const epCountEl = document.getElementById('epCount');
const gridLabel = document.getElementById('gridLabel');

function renderGrid(eps){
  grid.innerHTML = '';
  noResults.style.display = eps.length ? 'none' : 'block';
  epCountEl.innerHTML = `<span>${eps.length}</span> episodes`;
  gridLabel.textContent = eps.length === EPISODES.length ? 'All Episodes' : `${eps.length} result${eps.length===1?'':'s'}`;

  eps.forEach((ep,i) => {
    const card = document.createElement('article');
    card.className = 'episode-card';
    card.setAttribute('tabindex','0');
    card.setAttribute('role','button');
    card.setAttribute('aria-label', `Open ${ep.title}`);

    const tsCount = ep.timestamps ? ep.timestamps.length : 0;
    const dur = ep.duration || '';

    card.innerHTML = `
      <div class="card-thumb">
        <img
          src="${ytThumb(ep.video_id)}"
          alt="${escHtml(ep.title)}"
          loading="${i < 6 ? 'eager' : 'lazy'}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
        >
        <div class="thumb-fallback" style="display:none">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="m10 8 5 3-5 3V8z"/><path d="M7 21h10M12 17v4"/></svg>
        </div>
        <div class="thumb-play">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm-2 14.5v-9l7 4.5-7 4.5z"/></svg>
        </div>
        <span class="card-date-badge">${fmtDate(ep.date)}</span>
      </div>
      <div class="card-body">
        <h3 class="card-title font-display">${escHtml(ep.title)}</h3>
        <div class="card-footer">
          ${dur ? `<span class="pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${escHtml(dur)}</span>` : ''}
          ${tsCount > 0 ? `<span class="pill pill-accent"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>${tsCount} timestamps</span>` : ''}
        </div>
      </div>`;

    card.addEventListener('click', () => openPanel(ep));
    card.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();openPanel(ep);} });
    grid.appendChild(card);
  });
}

// ─── PANEL ─────────────────────────────────────────────────
const panel = document.getElementById('panel');
const overlay = document.getElementById('overlay');
let currentEp = null;

function openPanel(ep){
  currentEp = ep;
  const vid = ep.video_id;

  document.getElementById('panelImg').src = ytThumb(vid);
  document.getElementById('panelImg').alt = ep.title;
  document.getElementById('panelTitle').textContent = ep.title;
  document.getElementById('panelWatchBtn').href = `https://www.youtube.com/watch?v=${vid}`;

  // Pills
  const pills = [];
  if(ep.date) pills.push(`<span class="pill"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${fmtDate(ep.date)}</span>`);
  if(ep.duration) pills.push(`<span class="pill"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${ep.duration}</span>`);
  document.getElementById('panelPills').innerHTML = pills.join('');

  // Timestamps
  const body = document.getElementById('panelBody');
  const ts = (ep.timestamps || []);

  if(ts.length === 0){
    body.innerHTML = `<div style="padding:2rem 1.25rem;text-align:center;color:var(--text-muted);font-size:.875rem">No timestamps available for this episode.</div>`;
  } else {
    const guestTs = ts.filter(t=>t.is_guest || t.type==='guest');
    const topicTs = ts.filter(t=>!t.is_guest && t.type!=='guest');

    let html = '';
    if(topicTs.length){
      html += `<div class="ts-section-label">Topics & Segments</div><ul class="ts-list">`;
      topicTs.forEach(t=>{
        const url = ytUrl(vid, t.seconds);
        html += `<li><a href="${url}" target="_blank" rel="noopener" class="ts-item">
          <span class="ts-time">${escHtml(t.time)}</span>
          <span class="ts-desc">${escHtml(t.description)}</span>
          <svg class="ts-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a></li>`;
      });
      html += '</ul>';
    }
    if(guestTs.length){
      html += `<div class="ts-section-label" style="color:var(--guest-color)">🎙 Guest Appearances</div><ul class="ts-list">`;
      guestTs.forEach(t=>{
        const url = ytUrl(vid, t.seconds);
        html += `<li><a href="${url}" target="_blank" rel="noopener" class="ts-item is-guest">
          <span class="ts-time" style="background:var(--guest-dim);color:var(--guest-color)">${escHtml(t.time)}</span>
          <span class="ts-desc">${escHtml(t.description)}</span>
          <svg class="ts-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a></li>`;
      });
      html += '</ul>';
    }
    body.innerHTML = html;
  }

  body.scrollTop = 0;
  panel.classList.add('open');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  panel.focus();
}

function closePanel(){
  panel.classList.remove('open');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  currentEp = null;
}

document.addEventListener('keydown', e => {
  if(e.key === 'Escape') closePanel();
});

// ─── SEARCH ────────────────────────────────────────────────
const searchInput = document.getElementById('search');
function filterEpisodes(q){
  if(!q.trim()) return EPISODES;
  const lower = q.toLowerCase();
  return EPISODES.filter(ep => {
    if(ep.title.toLowerCase().includes(lower)) return true;
    if(ep.date.includes(lower)) return true;
    if(ep.timestamps && ep.timestamps.some(t => t.description && t.description.toLowerCase().includes(lower))) return true;
    return false;
  });
}

searchInput.addEventListener('input', e => {
  renderGrid(filterEpisodes(e.target.value));
});

// ─── THEME TOGGLE ──────────────────────────────────────────
(function(){
  const root = document.documentElement;
  const btn = document.querySelector('[data-theme-toggle]');
  let theme = root.getAttribute('data-theme') || 
    (matchMedia('(prefers-color-scheme:light)').matches ? 'light' : 'dark');
  root.setAttribute('data-theme', theme);
  
  function updateIcon(){
    btn.innerHTML = theme === 'dark'
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    btn.setAttribute('aria-label', `Switch to ${theme==='dark'?'light':'dark'} mode`);
  }
  updateIcon();
  
  btn.addEventListener('click', ()=>{
    theme = theme === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', theme);
    updateIcon();
  });
})();

// ─── INIT ──────────────────────────────────────────────────
renderGrid(EPISODES);
</script>
</body>
